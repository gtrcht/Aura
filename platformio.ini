; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = huge_app.csv
board_build.filesystem = littlefs
upload_speed = 921600
monitor_filters = esp32_exception_decoder

lib_deps = 
	bblanchon/ArduinoJson@^7.4.2
	lvgl/lvgl@^9.4.0
	bodmer/TFT_eSPI@^2.5.43
	https://github.com/PaulStoffregen/XPT2046_Touchscreen.git#v1.4
	knolleary/PubSubClient@^2.8
	tzapu/WiFiManager@^2.0.17
	esp32async/ESPAsyncWebServer@^3.9.6
	esp32async/AsyncTCP@^3.4.10
	thijse/ArduinoLog@^1.1.1

extra_scripts =
    pre:precompile_patch.py ; to fix LVGL compilation issues and comment the gamma correction that results in wrong colors. See: https://github.com/Bodmer/TFT_eSPI/issues/2985

build_flags = 
	-I include
    -D USER_SETUP_LOADED=1
    -D ILI9341_2_DRIVER=1
	-D LV_USE_TFT_ESPI=1
	-D LV_USE_LOG=1
	-D LV_FONT_SUBPX=0
	-D LV_ANTIALIAS=0

	-D CYD_SETUP_TYPE=2

    -D LV_CONF_INCLUDE_SIMPLE    ; Tells LVGL that lv_conf.h is in a simple path

    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1
    -D TFT_BL=21
    -D TOUCH_CS=-1             ; <--- to remove warning
    -D TFT_BACKLIGHT_ON=LOW  ; <--- Add this to turn screen off
    -D SPI_FREQUENCY=55000000
    -D LOAD_GFXFF=1           ; <--- THIS IS THE KEY For FreeFonts
    -D TFT_INVERSION_ON
